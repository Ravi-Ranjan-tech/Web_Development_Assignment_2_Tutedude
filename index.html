<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

  <div class="container">
    <h2>Create Account</h2>
    <p class="subtitle">Fill in the details below to register.</p>

    <div id="message" class="message" style="display:none;"></div>

    <form id="myForm">

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" />
        <span class="error" id="name-error"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <span class="error" id="email-error"></span>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number (10 digits)</label>
        <input type="tel" id="phone" placeholder="Enter 10-digit phone number" maxlength="10" />
        <span class="error" id="phone-error"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 8 chars, A-Z, a-z, 0-9" />
        <button type="button" id="show-password">Show</button>
        <span class="error" id="password-error"></span>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Re-enter your password" />
        <button type="button" id="show-confirm">Show</button>
        <span class="error" id="confirm-error"></span>
      </div>

      <button type="submit" id="submit-btn">Create Account</button>

    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
